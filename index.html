<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Monopolio</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", sans-serif;
      background: #0a0a0a;
      color: #fff;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container {
      display: flex;
      flex-direction: column;
      gap: 12px;
      width: 320px;
    }
    h1 {
      font-size: 13px;
      font-weight: 500;
      color: #666;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    a {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      background: #141414;
      border: 1px solid #222;
      border-radius: 10px;
      color: #fff;
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      transition: border-color 0.15s, background 0.15s;
    }
    a:hover {
      background: #1a1a1a;
      border-color: #333;
    }
    a span { color: #555; font-size: 16px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Monopolio</h1>
    <a href="/asesor-pagina-completa.html">
      Asesor — Página completa <span>→</span>
    </a>
    <a href="/asesor-perfil-propuesta.html">
      Asesor — Perfil y propuesta <span>→</span>
    </a>
  </div>
</body>
</html>
